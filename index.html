<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veena</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app">

        <!-- Header -->
        <header class="header">
            <div>
                <h2>🎬Veena Studio</h2>
            </div>
            <span class="status">● Live</span>
        </header>

        <!-- Prompt -->
        <div class="glass-card">
            <textarea placeholder="प्रॉम्प्ट लिखें"></textarea>
        </div>

        <!-- Upload -->
        <div class="upload-container">
            <label for="fileInput" class="upload-box">
                <span id="plusIcon">+</span>
                <img id="previewImg" class="hidden" />
            </label>
            <input type="file" id="fileInput" accept="image/*" hidden />
        </div>

        <!-- Settings -->
        <div class="glass-card grid">
            <div>
                <label>Length</label>
                <select>
                    <option>6s</option>
                    <option>8s</option>
                    <option selected>10s</option>
                </select>
            </div>

            <div>
                <label>Video Type</label>
                <select>
                    <option>Short Video</option>
                    <option>Long Video</option>
                </select>
            </div>

            <div>
                <label>Quality</label>
                <select>
                    <option>720p</option>
                    <option selected>1080p</option>
                </select>
            </div>

            <div>
                <label>AI Model</label>
                <select id="modelSelect">
                    <option value="sora-2">Sora 2 (1080p • 10s)</option>
                    <option value="higgsfield_v1">Higgsfield (1080p • 5–15s)</option>
                    <option value="kling-3">Kling 3 (1080p • 5–10s)</option>
                    <option value="seedance-2">Seedance 2 (1080p • 5–10s)</option>
                    <option value="nanobanana-video">Nano Banana (720p • 5–10s)</option>
                    <option value="ltxv-2">LTX Video 2 (4K • 6–10s)</option>
                    <option value="ltxv-13b">LTX-Video 13B (480p • 1–60s)</option>
                    <option value="veo2">Veo 2 (1080p • 10s)</option>
                    <option value="wan-25">Wan 2.5 (1080p • 5–10s)</option>
                </select>
            </div>
        </div>

        <!-- Preview -->
        <div class="glass-card">
            <label>Preview</label>
            <div class="preview-box">
                <img src="https://picsum.photos/500/300" />
                <div class="overlay">Preview</div>
            </div>
        </div>

    </div>

    <!-- Bottom CTA -->
    <div class="bottom-bar">
        <button class="generate-btn">✨ Generate Video</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
