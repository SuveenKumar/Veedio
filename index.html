<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veena</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app">

        <!-- Header -->
        <header class="header">
            <div>
                <h2>🎬Veena Studio</h2>
            </div>
            <span id="status">● Live</span>
        </header>

        <!-- Prompt -->
        <div class="glass-card">
            <div class="textarea-wrapper">
                <label>Prompt</label>
                <textarea id="promptInput" placeholder="प्रॉम्प्ट लिखें"></textarea>
                <div id="wordWarning" class="word-warning"></div>
            </div>
        </div>

        <!-- Settings -->
        <div class="glass-card grid">
            <div>
                <label>Length</label>
                <select id="videoLength">
                    <option>5s</option>
                    <option selected>10s</option>
                </select>
            </div>

            <div>
                <label>Type</label>
                <select id="videoType" class="dropDown">
                    <option>Short Video</option>
                    <option>Long Video</option>
                </select>
            </div>

            <div>
                <label>Quality</label>
                <select id="videoQuality">
                    <option>480p</option>
                    <option>720p</option>
                    <option>1080p</option>
                </select>
            </div>

            <div>
                <label>AI Model</label>
                <select id="videoAIModel">
                    <option value="sora-2">Sora 2 (1080p • 10s)</option>
                    <option value="higgsfield_v1">Higgsfield (1080p • 5–15s)</option>
                    <option value="kling-3">Kling 3 (1080p • 5–10s)</option>
                    <option value="seedance-2">Seedance 2 (1080p • 5–10s)</option>
                    <option value="nanobanana-video">Nano Banana (720p • 5–10s)</option>
                    <option value="ltxv-2">LTX Video 2 (4K • 6–10s)</option>
                    <option value="ltxv-13b">LTX-Video 13B (480p • 1–60s)</option>
                    <option value="veo2">Veo 2 (1080p • 10s)</option>
                    <option value="wan-25">Wan 2.5 (1080p • 5–10s)</option>
                </select>
            </div>
        </div>

        <!-- Preview -->
        <div class="glass-card">
            <label>Preview</label>
            <div>
                <video id="previewBox" width="220" controls style="display:none;">
                    <source id="videoSource" type="video/mp4">
                </video>
                <div class="overlay">Preview</div>
            </div>
        </div>

    </div>

    <!-- Bottom CTA -->
    <div class="bottom-bar">
        <button id="generateBtn">✨ Generate Video</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
